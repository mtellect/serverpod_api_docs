name: serverpod_api_docs
description: An automated OpenAPI documentation suite for Serverpod, supporting Scalar and Swagger UI.
version: 0.5.0 # Rebranded to serverpod_api_docs
homepage: https://serverpodswagger.vercel.app/
repository: https://github.com/arsheriff2k3/serverpod_swagger

executables:
  generate: serverpod_api_docs_generate

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  serverpod: ^3.4.2 # Updated to Serverpod 3.4.*
  yaml: ^3.1.3      # To parse protocol.yaml
  path: ^1.9.1      # For path manipulation
  analyzer: ^10.2.0
  glob: ^2.1.3

dev_dependencies:
  test: ^1.30.0     # For testing
  lints: ^6.1.0     # For linting
